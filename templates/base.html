<!DOCTYPE html>
<!-- Base template: HTML shell, CDN links, layout blocks -->
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pensijas kalkulators</title>

  <!-- Inter typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />

  <!-- Tailwind CSS utility framework (CDN, no build step) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js for the accumulation line chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Annotation plugin for plan-switch vertical reference lines -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <!-- Custom styles (minimal overrides on top of Tailwind) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans antialiased">

  {% block content %}{% endblock %}

  <!-- JS modules loaded after DOM is ready -->
  {% block scripts %}{% endblock %}
</body>
</html>
