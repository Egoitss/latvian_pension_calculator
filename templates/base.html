<!DOCTYPE html>
<!-- Base template: HTML shell, CDN links, layout blocks -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pension Scenario Simulator — OATS</title>
  <link rel="icon" type="image/svg+xml"
        href="{{ url_for('static', filename='favicon.svg') }}?v=2" />

  <!-- OATS typeface stack: Space Grotesk + IBM Plex Sans + IBM Plex Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

  <!-- Tailwind CSS utility framework (CDN, no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["IBM Plex Sans", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>

  <!-- Chart.js for the accumulation line chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Annotation plugin for plan-switch vertical reference lines -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <!-- Base custom styles -->
  <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}" />
  <!-- OATS theme — loaded after Tailwind to override design tokens -->
  <link rel="stylesheet"
        href="{{ url_for('static', filename='css/oats-theme.css') }}" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans antialiased">

  <!-- OATS brand nav — update href attrs for production deployment -->
  <nav class="oats-nav">
    <a class="oats-logo" href="http://localhost:8000/home.html">
      <svg class="oats-logo-mark" viewBox="0 0 100 100"
           role="img" aria-label="OATS">
        <path fill="currentColor" fill-rule="evenodd"
              d="M0 0H100V100H0Z
                 M76 50A26 26 0 1 1 24 50A26 26 0 1 1 76 50Z
                 M62 50A12 12 0 1 1 38 50A12 12 0 1 1 62 50Z"/>
      </svg>
      OATS SIA
    </a>
    <span class="oats-crumb">[ Pension Scenario Simulator ]</span>
    {# Return to wherever the visitor came from (file://, localhost,
       or live domain). Falls back to the hardcoded URL only when
       opened with no history (direct load / fresh tab). #}
    <a class="oats-back" href="http://localhost:8000/home.html"
       onclick="if (history.length > 1) {
                  history.back(); return false; }">
      ← Portfolio
    </a>
  </nav>

  {% block content %}{% endblock %}

  <!-- JS modules loaded after DOM is ready -->
  {% block scripts %}{% endblock %}
</body>
</html>
