<!-- Left panel: shared assumptions used by all three pillars -->
<div class="rounded-3xl border border-slate-200 bg-white shadow-sm">
  <div class="space-y-5 p-6">

    <!-- Birth date — age computed automatically by ui.js -->
    <div class="space-y-2">
      <label class="text-sm font-medium text-slate-700">Dzimšanas gads un mēnesis</label>
      <div class="flex gap-2">
        <select id="birthMonth"
                class="w-36 rounded-2xl border border-slate-200 bg-white px-3 py-3 text-sm
                       outline-none transition focus:border-slate-500 focus:ring-2
                       focus:ring-slate-200">
          {% set months = ["Janvāris","Februāris","Marts","Aprīlis","Maijs","Jūnijs",
                           "Jūlijs","Augusts","Septembris","Oktobris","Novembris","Decembris"] %}
          {% for i in range(1, 13) %}
            <option value="{{ i }}"
                    {{ "selected" if i == defaults.birth_month else "" }}>
              {{ months[i-1] }}
            </option>
          {% endfor %}
        </select>
        <input id="birthYear" type="number" step="1" min="1930" max="2020"
               value="{{ defaults.birth_year }}"
               class="flex-1 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm
                      outline-none transition focus:border-slate-500 focus:ring-2
                      focus:ring-slate-200" />
      </div>
      <div class="text-[11px] text-slate-400">
        Vecums: <span id="computedAge" class="font-medium text-slate-600"></span> gadi
      </div>
    </div>

    <!-- Retirement age — auto-populated by ui.js from birth year trend, editable -->
    <div class="space-y-2">
      <label class="text-sm font-medium text-slate-700" for="retirementAge">
        Pensionēšanās vecums
      </label>
      <input id="retirementAge" type="number" step="1"
             value="{{ defaults.retirement_age }}"
             class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm
                    outline-none transition focus:border-slate-500 focus:ring-2
                    focus:ring-slate-200" />
      <div class="text-[11px] text-slate-400">
        Pensijā:
        <span id="retirementYearDisplay" class="font-medium text-slate-600"></span>
        · automātiski aprēķināts, maināms
      </div>
    </div>

    <!-- Gross monthly salary — shared: drives P2 VSAOI contributions and P3 IIN refund -->
    <div class="space-y-2">
      <div class="flex items-start justify-between">
        <label class="text-sm font-medium text-slate-700" for="grossMonthly">
          Bruto alga mēnesī
        </label>
        <span class="text-xs text-slate-400">€ / mēn.</span>
      </div>
      <input id="grossMonthly" type="number" step="0.01"
             value="{{ defaults.gross_monthly }}"
             class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm
                    outline-none transition focus:border-slate-500 focus:ring-2
                    focus:ring-slate-200" />
    </div>

    <!-- Salary growth — shared: P1 NDC + P2 projection -->
    <div class="space-y-2">
      <label class="text-sm font-medium text-slate-700">Algas pieaugums gadā</label>
      <input id="salaryGrowth" type="range" min="0" max="8" step="0.25"
             value="{{ defaults.salary_growth }}"
             class="w-full accent-slate-900" />
      <div id="salaryGrowthDisplay" class="text-sm font-medium">
        {{ "%.2f"|format(defaults.salary_growth) }}%
      </div>
    </div>

    <!-- Inflation — shared: real-value calculations for all three pillars -->
    <div class="space-y-2">
      <div class="flex items-start justify-between">
        <label class="text-sm font-medium text-slate-700">Inflācija</label>
        <span class="text-xs text-slate-400">pirktspējas aprēķinam</span>
      </div>
      <input id="inflation" type="range" min="0" max="8" step="0.01"
             value="{{ defaults.inflation }}"
             class="w-full accent-slate-900" />
      <div id="inflationDisplay" class="text-sm font-medium">
        {{ "%.2f"|format(defaults.inflation) }}%
      </div>
    </div>

    <!-- Payout period — shared: P2 monthly payout + P3 monthly payout -->
    <div class="space-y-2">
      <label class="text-sm font-medium text-slate-700">Izmaksas periods</label>
      <div class="flex items-center gap-3">
        <input id="payoutYears" type="number" step="1"
               value="{{ defaults.payout_years }}"
               class="w-24 rounded-2xl border border-slate-200 bg-white px-4 py-3
                      text-sm outline-none transition focus:border-slate-500
                      focus:ring-2 focus:ring-slate-200" />
        <span class="text-sm text-slate-500">izmaksas gadi</span>
      </div>
    </div>

  </div>
</div>
