<!-- Three scenario buttons + combined P1+P2+P3 summary display -->
<!-- #scenarioReturn is the shared-state element read by ui.js and pension3.js -->
<div id="scenarioReturn" data-value="8.0" class="hidden" aria-hidden="true"></div>

<!-- Gender toggle — affects survival probability shown in the P2 card -->
<div class="flex gap-2">
  <button id="genderMale" type="button"
          class="flex-1 rounded-2xl border px-3 py-2 text-sm font-medium
                 transition text-center border-slate-900 bg-slate-900
                 text-white">
    ♂ Vīrietis
  </button>
  <button id="genderFemale" type="button"
          class="flex-1 rounded-2xl border px-3 py-2 text-sm font-medium
                 transition text-center border-slate-200 bg-white
                 text-slate-600 hover:border-slate-400">
    ♀ Sieviete
  </button>
</div>

<!-- Scenario selector row -->
<div class="flex gap-1.5">

  <button id="btnPositive" type="button"
          class="flex-1 rounded-2xl border px-2 py-2 text-sm font-semibold
                 transition border-emerald-300 bg-white text-emerald-700
                 hover:bg-emerald-50">
    <div class="text-xs font-bold">Pozitīvais</div>
    <div id="rateLabelPositive"
         class="text-[11px] mt-0.5 opacity-90">—%</div>
    <div class="text-[9px] mt-0.5 opacity-70">90. procentile</div>
  </button>

  <button id="btnModerate" type="button"
          class="flex-1 rounded-2xl border px-2 py-2 text-sm font-semibold
                 transition border-slate-900 bg-slate-900 text-white">
    <div class="text-xs font-bold">Mērenais</div>
    <div id="rateLabelModerate"
         class="text-[11px] mt-0.5 opacity-90">—%</div>
    <div class="text-[9px] mt-0.5 opacity-70">50. procentile</div>
  </button>

  <button id="btnNegative" type="button"
          class="flex-1 rounded-2xl border px-2 py-2 text-sm font-semibold
                 transition border-red-300 bg-white text-red-600
                 hover:bg-red-50">
    <div class="text-xs font-bold">Negatīvais</div>
    <div id="rateLabelNegative"
         class="text-[11px] mt-0.5 opacity-90">—%</div>
    <div class="text-[9px] mt-0.5 opacity-70">10. procentile</div>
  </button>

</div>

<!-- Combined 3-pillar summary card -->
<div class="rounded-3xl border border-slate-200 bg-white shadow-sm">
  <div class="p-4">

    <div class="flex items-center justify-between mb-2">
      <h2 class="text-base font-semibold">
        Kopējā pensija (1. + 2. + 3.)
      </h2>
      <span id="activeScenarioLabel"
            class="text-xs font-medium text-slate-500">
        Mērenais scenārijs
      </span>
    </div>

    <!-- Four metric tiles -->
    <div class="grid grid-cols-2 gap-2">

      <div class="rounded-2xl bg-slate-50 px-3 py-2.5 text-center">
        <div class="text-[10px] text-slate-400 mb-0.5">Kopējais kapitāls</div>
        <div id="combinedTotal"
             class="text-lg font-bold text-slate-900">—</div>
        <div id="combinedRealTotal"
             class="text-[10px] text-slate-500 mt-0.5">—</div>
      </div>

      <div class="rounded-2xl bg-emerald-50 border border-emerald-100
                  px-3 py-2.5 text-center">
        <div class="text-[10px] text-slate-400 mb-0.5">Ikmēneša izmaksa</div>
        <div id="combinedMonthly"
             class="text-lg font-bold text-emerald-900">—</div>
        <div id="combinedRealMonthly"
             class="text-[10px] text-slate-500 mt-0.5">—</div>
      </div>

      <div class="rounded-2xl bg-slate-50 px-3 py-2.5 text-center">
        <div class="text-[10px] text-slate-400 mb-0.5">2. līm. peļņa</div>
        <div id="combinedP2Earnings"
             class="text-sm font-bold text-slate-900">—</div>
      </div>

      <div class="rounded-2xl bg-slate-50 px-3 py-2.5 text-center">
        <div class="text-[10px] text-slate-400 mb-0.5">
          3. līm. peļņa (pēc IIN)
        </div>
        <div id="combinedP3NetGains"
             class="text-sm font-bold text-slate-900">—</div>
      </div>

    </div>

    <!-- Per-pillar breakdown -->
    <div class="mt-2 flex gap-1.5">
      <div class="flex-1 rounded-2xl bg-slate-50 px-2 py-1.5 text-center">
        <div class="text-[9px] text-slate-400">1. līm.</div>
        <div id="breakdownP1"
             class="text-[11px] font-semibold text-slate-700">—</div>
      </div>
      <div class="flex-1 rounded-2xl bg-slate-50 px-2 py-1.5 text-center">
        <div class="text-[9px] text-slate-400">2. līm.</div>
        <div id="breakdownP2"
             class="text-[11px] font-semibold text-slate-700">—</div>
      </div>
      <div class="flex-1 rounded-2xl bg-slate-50 px-2 py-1.5 text-center">
        <div class="text-[9px] text-slate-400">3. līm.</div>
        <div id="breakdownP3"
             class="text-[11px] font-semibold text-slate-700">—</div>
      </div>
    </div>

    <!-- bootstrapNote is a span so the static context sits beside it -->
    <div class="mt-1.5 text-[10px] text-slate-400 leading-4">
      <span id="bootstrapNote">Monte Carlo aprēķins notiek…</span>
      · Izmaksa: 1. līm. NDC formula, 2.+3. līm. pēc
      <span id="chartPeriod"></span>
    </div>

  </div>
</div>
