<!-- Accumulation line chart: contributions, earnings, and total over time -->
<div class="rounded-3xl border border-slate-200 bg-white shadow-sm">
  <div class="p-5">

    <!-- Chart heading and period summary -->
    <div class="mb-4 flex flex-col gap-1 md:flex-row md:items-center md:justify-between">
      <div>
        <h2 class="text-lg font-semibold">Uzkrājuma sadalījums laikā</h2>
        <p class="text-sm text-slate-500">
          Iemaksas, ieguldījumu peļņa un kopējais 2. līmeņa uzkrājums.
        </p>
      </div>
      <div class="text-sm text-slate-500">
        Periods: {{ projection.years }} gadi
      </div>
    </div>

    <!-- Canvas target for Chart.js — chart.js reads this id -->
    <div class="h-[390px] w-full">
      <canvas id="projectionChart"></canvas>
    </div>

  </div>
</div>
