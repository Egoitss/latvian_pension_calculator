# Runs the pension calculator behind Caddy (auto-HTTPS) on a VPS.
# Caddy terminates TLS for pension.oats.lv and proxies to the app.
# When BMX/METL join, add a service each + a block in the Caddyfile
# (and ideally move this to a dedicated deploy repo).
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy   # access logs (visit data)

  pension:
    build: ..                 # repo root holds the Dockerfile
    restart: unless-stopped
    env_file: ../.env         # DEEPSEEK_API_KEY etc. (not committed)
    # Persist the download counter outside the container so a rebuild
    # (docker compose up --build) no longer resets the running total.
    environment:
      - DOWNLOAD_COUNT_FILE=/data/download_count.json
    volumes:
      - pension_data:/data
    expose:
      - "5001"

volumes:
  caddy_data: {}
  caddy_config: {}
  caddy_logs: {}
  pension_data: {}
